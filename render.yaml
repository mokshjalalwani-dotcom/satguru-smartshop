services:
  # 1. AI Intelligence Service (Python/FastAPI)
  - type: web
    name: satguru-ai-service
    env: python
    region: singapore
    plan: free
    rootDir: ai-service
    buildCommand: "pip install -r requirements.txt && python generate_data.py && python train.py"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT --workers 1 --limit-concurrency 4"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: MONGODB_URI
        sync: false # User must provide this in Render Dashboard

  # 2. Main Shop Portal (Node.js/Express + React Frontend)
  - type: web
    name: satguru-shop-portal
    env: node
    region: singapore
    plan: free
    buildCommand: "npm install && cd backend-api && npm install && cd .. && cd admin-portal && npm install && npm run build"
    startCommand: "node server.js"
    envVars:
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: satguru-ai-service
          property: host
      - key: AI_SERVICE_INTERNAL_URL
        value: "http://satguru-ai-service:10000"
      - key: MONGODB_URI
        sync: false # User must provide this in Render Dashboard
